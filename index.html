<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clem's Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: oklch(0.185 0.012 60);
    --bg2: oklch(0.228 0.014 62);
    --bg3: oklch(0.27 0.015 62);
    --cream: oklch(0.94 0.018 85);
    --muted: oklch(0.72 0.014 80);
    --faint: oklch(0.58 0.012 76);
    --line: oklch(0.34 0.012 64);
    --accent: oklch(0.76 0.09 126);
    --accent-deep: oklch(0.52 0.07 148);
    --serif: 'Newsreader', Georgia, serif;
    --sans: 'Hanken Grotesk', system-ui, sans-serif;
    --mono: 'Spline Sans Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--bg); color: var(--cream); font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--accent); color: var(--bg); }

  .app { min-height: 100vh; }
  .wrap { max-width: 1140px; margin: 0 auto; padding: 0 48px 80px; }

  .eyebrow { font-family: var(--mono); font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); }
  .k { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint); }

  /* topbar */
  .topbar {
    max-width: 1140px; margin: 0 auto; padding: 28px 48px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .brand { font-family: var(--serif); font-size: 24px; letter-spacing: 0.01em; cursor: pointer; }
  .brand i { font-style: italic; color: var(--accent); }

  /* buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--sans); font-size: 13.5px; font-weight: 600; white-space: nowrap;
    color: var(--bg); background: var(--accent); border: none; border-radius: 99px;
    padding: 11px 18px; cursor: pointer; transition: filter .15s, transform .05s;
  }
  .btn:hover { filter: brightness(1.06); }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn.ghost { background: transparent; color: var(--cream); border: 1px solid var(--line); }
  .btn.ghost:hover { border-color: var(--accent); color: var(--accent); filter: none; }
  .btn.sm { padding: 9px 15px; font-size: 12.5px; }

  /* progress bar */
  .bar { height: 5px; border-radius: 99px; background: var(--bg3); overflow: hidden; }
  .bar > span { display: block; height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent-deep), var(--accent)); transition: width .4s ease; }

  /* ---------- cover ---------- */
  .cover {
    position: relative; border-radius: 3px 5px 5px 3px; overflow: hidden; flex: none;
    box-shadow: 0 18px 40px -18px rgba(0,0,0,0.7), 0 2px 6px rgba(0,0,0,0.4);
    background-image:
      radial-gradient(120% 80% at 30% 0%, rgba(255,255,255,0.10), transparent 55%),
      linear-gradient(90deg, rgba(0,0,0,0.22) 0 4px, transparent 4px 9px, rgba(255,255,255,0.04) 9px 10px);
  }
  .cover::after { content:""; position:absolute; inset:0; border:1px solid rgba(255,255,255,0.10); border-radius:inherit; pointer-events:none; }
  .cover__inner { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 14px 14px 16px 18px; }
  .cover__title { font-family: var(--serif); line-height: 1.08; color: oklch(0.96 0.012 85); letter-spacing: 0.005em; text-wrap: balance; }
  .cover__author { font-family: var(--sans); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; color: rgba(255,255,255,0.66); }
  .cover__rule { width: 22px; height: 2px; background: rgba(255,255,255,0.4); }
  .cover.sm { width: 124px; height: 186px; } .cover.sm .cover__title { font-size: 16px; } .cover.sm .cover__inner { padding: 11px 11px 12px 13px; }
  .cover.md { width: 150px; height: 225px; } .cover.md .cover__title { font-size: 18px; }
  .cover.lg { width: 250px; height: 375px; } .cover.lg .cover__title { font-size: 30px; }

  /* ---------- hero ---------- */
  .hero { padding-top: 30px; }
  .hero__grid { display: flex; gap: 56px; margin-top: 26px; }
  .hero__cover { background: none; border: none; padding: 0; cursor: pointer; transition: transform .18s; }
  .hero__cover:hover { transform: translateY(-4px); }
  .hero__info { flex: 1; padding-top: 4px; }
  .hero__series { font-family: var(--mono); font-size: 12px; color: var(--faint); letter-spacing: 0.08em; }
  .hero__title { font-family: var(--serif); font-weight: 500; font-size: 50px; line-height: 1.04; margin: 12px 0 6px; letter-spacing: 0.005em; }
  .hero__author { font-size: 18px; color: var(--muted); } .hero__author span { color: var(--cream); }
  .hero__prog { margin-top: 36px; max-width: 460px; }
  .hero__prog-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 11px; }
  .hero__pct { font-family: var(--serif); font-size: 17px; color: var(--accent); }
  .meta-row { display: flex; gap: 34px; margin-top: 32px; }
  .meta { display: flex; flex-direction: column; gap: 5px; }
  .meta .v { font-family: var(--serif); font-size: 19px; color: var(--cream); }
  .hero__btns { display: flex; gap: 12px; margin-top: 36px; }
  .hero__also { margin-top: 34px; }
  .hero__also-row { display: flex; gap: 16px; margin-top: 12px; }

  .hero__empty {
    margin-top: 24px; border: 1px dashed var(--line); border-radius: 14px;
    padding: 54px; display: flex; flex-direction: column; align-items: center; gap: 16px;
    color: var(--muted); text-align: center;
  }
  .hero__empty p { margin: 0; line-height: 1.5; }

  /* ---------- sections / shelves ---------- */
  .shelf-sec { margin-top: 58px; }
  .section-head { display: flex; align-items: baseline; justify-content: space-between; border-bottom: 1px solid var(--line); padding-bottom: 12px; }
  .section-head h2 { font-family: var(--serif); font-weight: 400; font-size: 23px; margin: 0; letter-spacing: 0.01em; }
  .section-head .count { font-family: var(--mono); font-size: 12px; color: var(--faint); }
  .row { display: flex; flex-wrap: wrap; gap: 26px 30px; margin-top: 26px; }
  .empty { margin-top: 22px; color: var(--faint); font-size: 14.5px; }

  /* book card */
  .bookcard { background: none; border: none; padding: 0; cursor: pointer; text-align: left; display: flex; flex-direction: column; gap: 11px; width: 150px; }
  .bookcard .cover { transition: transform .18s, box-shadow .18s; }
  .bookcard:hover .cover { transform: translateY(-5px); box-shadow: 0 26px 46px -18px rgba(0,0,0,0.78), 0 2px 6px rgba(0,0,0,0.4); }
  .bookcard__a { font-size: 12.5px; color: var(--muted); line-height: 1.3; }

  /* footer */
  .foot { margin-top: 70px; padding-top: 22px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; font-family: var(--mono); font-size: 12px; color: var(--faint); }
  .foot button { background: none; border: none; color: var(--faint); font-family: var(--mono); font-size: 12px; cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
  .foot button:hover { color: var(--muted); }

  /* ---------- modal ---------- */
  .overlay { position: fixed; inset: 0; background: oklch(0.12 0.01 60 / 0.66); backdrop-filter: blur(3px); display: flex; align-items: flex-start; justify-content: center; padding: 64px 24px; z-index: 50; overflow-y: auto; animation: fade .18s ease; }
  @keyframes fade { from { opacity: 0; } }
  .modal { position: relative; width: 100%; background: var(--bg2); border: 1px solid var(--line); border-radius: 16px; padding: 32px; box-shadow: 0 40px 90px -30px rgba(0,0,0,0.8); animation: pop .2s ease; }
  @keyframes pop { from { opacity: 0; transform: translateY(10px); } }
  .modal__x { position: absolute; top: 18px; right: 18px; background: none; border: none; color: var(--faint); cursor: pointer; padding: 6px; border-radius: 8px; }
  .modal__x:hover { color: var(--cream); background: var(--bg3); }
  .modal__title { font-family: var(--serif); font-weight: 500; font-size: 26px; margin: 0 0 22px; }

  /* form */
  .form { display: flex; flex-direction: column; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 7px; }
  .field > span { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--faint); }
  .field em { font-style: normal; text-transform: none; letter-spacing: 0; color: var(--faint); opacity: 0.7; }
  .field input, .notes__add textarea {
    background: var(--bg); border: 1px solid var(--line); border-radius: 9px; color: var(--cream);
    font-family: var(--sans); font-size: 15px; padding: 11px 13px; width: 100%; outline: none; transition: border-color .15s;
  }
  .field input:focus, .notes__add textarea:focus { border-color: var(--accent); }
  .field input::placeholder, .notes__add textarea::placeholder { color: var(--faint); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .seg { display: inline-flex; background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 3px; gap: 3px; }
  .seg button { flex: 1; background: none; border: none; color: var(--muted); font-family: var(--sans); font-size: 13.5px; font-weight: 500; padding: 9px 16px; border-radius: 7px; cursor: pointer; white-space: nowrap; transition: background .12s, color .12s; }
  .seg button:hover { color: var(--cream); }
  .seg button.on { background: var(--accent); color: var(--bg); font-weight: 600; }
  .seg--sm button { padding: 7px 13px; font-size: 12.5px; }

  .swatches { display: flex; gap: 9px; }
  .swatch { width: 30px; height: 40px; border-radius: 3px; border: 2px solid transparent; cursor: pointer; box-shadow: 0 4px 10px -4px rgba(0,0,0,0.6); }
  .swatch.on { border-color: var(--cream); outline: 2px solid var(--bg2); }

  .form__foot { display: flex; justify-content: flex-end; gap: 12px; margin-top: 8px; }

  /* detail modal */
  .detail { display: flex; gap: 28px; }
  .detail__left { flex: none; }
  .detail__right { flex: 1; min-width: 0; }
  .detail__title { font-family: var(--serif); font-weight: 500; font-size: 30px; line-height: 1.08; margin: 8px 0 4px; }
  .detail__author { font-size: 16px; color: var(--muted); }
  .prog { margin-top: 20px; max-width: 340px; }
  .prog__head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 9px; }
  .prog__pct { font-family: var(--serif); font-size: 16px; color: var(--accent); }
  .prog__edit { display: flex; align-items: center; gap: 2px; margin-top: 12px; font-size: 13px; color: var(--muted); font-family: var(--mono); }
  .prog__edit input { width: 70px; background: var(--bg); border: 1px solid var(--line); border-radius: 7px; color: var(--cream); font-family: var(--mono); font-size: 13px; padding: 6px 9px; outline: none; }
  .prog__edit input:focus { border-color: var(--accent); }
  .detail__meta { display: flex; flex-direction: column; gap: 6px; margin-top: 20px; font-size: 14px; color: var(--muted); }
  .detail__meta b { color: var(--cream); font-weight: 600; }

  .notes { margin-top: 28px; border-top: 1px solid var(--line); padding-top: 22px; }
  .notes__head { display: flex; align-items: center; gap: 8px; font-family: var(--serif); font-size: 18px; color: var(--cream); margin-bottom: 14px; }
  .notes__head svg { color: var(--accent); }
  .notes__add { display: flex; gap: 10px; align-items: flex-end; }
  .notes__add textarea { resize: vertical; min-height: 44px; font-family: var(--sans); line-height: 1.5; }
  .notes__list { display: flex; flex-direction: column; gap: 12px; margin-top: 16px; }
  .notes__empty { font-size: 13.5px; color: var(--faint); }
  .note { background: var(--bg); border: 1px solid var(--line); border-radius: 11px; padding: 14px 16px; }
  .note p { margin: 0 0 10px; font-family: var(--serif); font-size: 16px; line-height: 1.5; color: var(--cream); }
  .note__foot { display: flex; justify-content: space-between; align-items: center; font-family: var(--mono); font-size: 11px; color: var(--faint); }
  .note__foot button { background: none; border: none; color: var(--faint); cursor: pointer; padding: 3px; border-radius: 6px; }
  .note__foot button:hover { color: oklch(0.65 0.13 25); background: var(--bg3); }

  .detail__del { margin-top: 22px; display: inline-flex; align-items: center; gap: 7px; background: none; border: none; color: var(--faint); font-family: var(--sans); font-size: 13px; cursor: pointer; padding: 4px; }
  .detail__del:hover { color: oklch(0.68 0.14 25); }

  @media (max-width: 760px) {
    .wrap, .topbar { padding-left: 24px; padding-right: 24px; }
    .hero__grid { flex-direction: column; gap: 28px; }
    .hero__title { font-size: 38px; }
    .detail { flex-direction: column; align-items: center; text-align: center; }
    .detail__meta { align-items: center; }
    .row2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script type="text/babel" src="library-store.jsx"></script>
<script type="text/babel" src="library-app.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(<window.LibraryApp />);
</script>
</body>
</html>
